{% extends "base.html" %}{% load static %}
{% block title %}Bulk Orders | S2U Orders{% endblock %}
{% block content %}
<section class="page-heading compact-heading"><div><p class="eyebrow">Saved workspaces</p><h1>Bulk orders</h1><p>Create reusable product lists and plan cases by store.</p></div><a href="{% url 'home' %}" class="secondary-button"><i data-lucide="arrow-left"></i>Stores</a></section>
<section class="bulk-create-bar"><label><span>New bulk order</span><input id="bulk-order-name" maxlength="160" placeholder="Example: Casamigos 25 cases"></label><button id="create-bulk-order" class="primary-button"><i data-lucide="plus"></i>Create</button></section>
<section id="bulk-order-cards" class="bulk-order-cards"><div class="loading-line">Loading bulk orders…</div></section>
{% endblock %}
{% block scripts %}<script src="{% static 'orders/bulk_orders.js' %}?v=20260712b"></script>{% endblock %}
