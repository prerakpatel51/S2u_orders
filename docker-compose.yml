services:
  migrate:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/orders
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "1"
      RUN_MIGRATIONS: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --worker-class gthread --threads 4 --timeout 60 --keep-alive 5
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/orders
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "1"
      RUN_MIGRATIONS: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: celery -A config worker -l INFO --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/orders
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "1"
      RUN_MIGRATIONS: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A config beat -l INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/orders
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "1"
      RUN_MIGRATIONS: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
